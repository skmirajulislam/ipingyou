version: 2

updates:
  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    target-branch: "master"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    labels:
      - "github-actions"
      - "dependencies"
